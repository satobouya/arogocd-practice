apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: default

spec:
  replicas: 1

  selector:
    matchLabels:
      app: oauth2-proxy

  template:
    metadata:
      labels:
        app: oauth2-proxy

    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3

          args:
            - --provider=google
            - --http-address=0.0.0.0:4180
            - --redirect-url=http://localhost:8081/oauth2/callback
            - --upstream=http://my-app-service.default.svc.cluster.local:80
            - --email-domain=*
            - --cookie-secure=false
            - --skip-provider-button=true

          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-id

            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret

            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret

          ports:
            - name: http
              containerPort: 4180
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: default

spec:
  selector:
    app: oauth2-proxy

  ports:
    - name: http
      port: 4180
      targetPort: http
      protocol: TCP

  type: ClusterIP