apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-app

spec:
  replicas: 2

  strategy:
   type: RollingUpdate
   rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
      - name: my-app
        image: ponychan3/my-app:27b42a255b950d20da12c27942494548204415e8
        ports:
        - containerPort: 80