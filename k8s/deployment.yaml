apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-app

spec:
  replicas: 1
  minReadySeconds: 5

  strategy:
   type: RollingUpdate
   rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
      - name: my-app
        image: ponychan3/my-app:3f7b296f4e50bbfbeb1b1b213ccc4ef2f22e2e71
        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
           path: /
           port: 80
          initialDelaySeconds: 2
          periodSeconds: 2
          timeoutSeconds: 1
          failureThreshold: 3